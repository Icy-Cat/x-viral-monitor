<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>X Viral Monitor</title>
  <style>
    :root {
      --bg: #f4efe5;
      --card: rgba(255, 252, 246, 0.95);
      --line: rgba(86, 60, 34, 0.18);
      --text: #24180f;
      --muted: #6e5b4d;
      --accent: #bf5a2a;
      --accent-strong: #8f3d17;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 320px;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
    }
    .popup { padding: 16px; }

    h1 { font-size: 16px; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

    .info-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }
    .info-box .tier {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 4px 0;
    }
    .tier .icon { font-size: 14px; }
    .tier .label { font-weight: 600; color: var(--text); min-width: 50px; }
    .tier .range { color: var(--muted); }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 12px 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }
    .field span {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }
    .field input {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font: inherit;
      color: var(--text);
      background: rgba(255,255,255,0.85);
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row { display: flex; gap: 8px; }
    .row .field {
      flex: 1 1 0;
      min-width: 0;
    }

    .actions { display: flex; gap: 8px; margin-top: 6px; }
    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 999px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      color: #fff8f1;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
    button:hover { opacity: 0.9; }
    button#reset {
      color: var(--text);
      background: rgba(36, 24, 15, 0.08);
    }
    .status-msg {
      font-size: 11px;
      color: var(--accent);
      margin-top: 6px;
      min-height: 1.2em;
    }

    .feature-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .feature-row input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .feature-row .ft-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .feature-row .ft-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .feature-row label { cursor: pointer; flex: 1; }
    .ft-cache {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
      font-size: 10px;
      color: var(--muted);
    }
    .ft-cache button {
      flex: 0 0 auto;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      color: #fff8f1;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }
    .ft-cache button:hover { opacity: 0.9; }
    .ft-cache button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="popup">
    <h1>X Viral Monitor</h1>
    <p class="subtitle">Real-time impression velocity on X tweets</p>

    <div class="info-box">
      <div class="tier"><span class="icon">🌱</span><span class="label">Normal</span><span class="range" id="range-green">< 1,000/h</span></div>
      <div class="tier"><span class="icon">🚀</span><span class="label">Trending</span><span class="range" id="range-orange">1,000 ~ 10,000/h</span></div>
      <div class="tier"><span class="icon">🔥</span><span class="label">Viral</span><span class="range" id="range-red">≥ 10,000/h</span></div>
      <div style="margin-top:6px; font-size:11px;">
        Hover over badges to see Views, Likes, RT, Replies, Bookmarks, Viral Score.
      </div>
    </div>

    <div class="divider"></div>

    <form id="settings-form">
      <div class="row">
        <label class="field">
          <span>🚀 Trending threshold</span>
          <input id="trending" type="number" min="1" step="1" required>
        </label>
        <label class="field">
          <span>🔥 Viral threshold</span>
          <input id="viral" type="number" min="2" step="1" required>
        </label>
      </div>
      <div class="actions">
        <button type="submit">Save</button>
        <button type="button" id="reset">Reset</button>
      </div>
      <p id="status" class="status-msg" role="status"></p>
    </form>

    <div class="divider"></div>

    <div class="feature-row">
      <input id="feat-bookmark-folders" type="checkbox">
      <label for="feat-bookmark-folders">
        <div class="ft-title">🔖 Bookmark folder menu</div>
        <div class="ft-desc">Hover a tweet's bookmark button to pick a folder or create a new one. Requires X Premium.</div>
        <div class="ft-cache">
          <span id="folder-cache-info">No folders cached</span>
          <button type="button" id="refresh-folders">Refresh</button>
        </div>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
